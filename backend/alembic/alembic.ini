# ============================================================
# Alembic 配置 - 面向能源可信数据空间
# 数据库迁移工具配置
# ============================================================

[alembic]
# 迁移脚本路径
script_location = backend/alembic

# 数据库连接 URL (通过环境变量覆盖)
sqlalchemy.url = postgresql://energy_admin:changeme_pg_password@postgres:5432/energy_tds

# 迁移脚本模板
file_template = %%(rev)s_%%(slug)s

# 时区
timezone = Asia/Shanghai

# 输出编码
output_encoding = utf-8

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
