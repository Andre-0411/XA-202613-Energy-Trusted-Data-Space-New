# ============================================================
# 面向能源可信数据空间 - Docker Compose 编排
# ============================================================
version: "3.9"

services:
  # ==================== 基础设施 ====================

  postgres:
    image: postgres:16
    container_name: etds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-energy_tds}
      POSTGRES_USER: ${POSTGRES_USER:-energy_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_pg_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-energy_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: etds-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: etds-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-energy_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_mongo_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-energy_tds_meta}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: etds-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-energy_minio_access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5
    container_name: etds-emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: etds-emqx
      EMQX_LOADED_MODULES: "emqx_mod_acl_internal,emqx_mod_presence"
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== 消息队列 ====================

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: etds-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-energy_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme_rabbit_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-energy_tds}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== 反向代理 ====================

  nginx:
    image: nginx:alpine
    container_name: etds-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== 应用服务 ====================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etds-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      emqx:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - energy-net
      - fisco-net
      - privacy-net
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: etds-frontend
    restart: unless-stopped
    # 前端通过 nginx:80 对外提供服务，此处不暴露端口
    # 仅用于构建静态文件，nginx 挂载 ./frontend/dist
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ==================== FISCO BCOS 区块链节点 ====================

  fisco-node0:
    image: fiscoorg/fiscobcos:v3
    container_name: etds-fisco-node0
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/fisco-bcos"]
    command: ["-c", "/data/config.ini"]
    ports:
      - "20200:20200"
    volumes:
      - fisco_node0:/data
    networks:
      - fisco-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  fisco-node1:
    image: fiscoorg/fiscobcos:v3
    container_name: etds-fisco-node1
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/fisco-bcos"]
    command: ["-c", "/data/config.ini"]
    ports:
      - "20201:20200"
    volumes:
      - fisco_node1:/data
    networks:
      - fisco-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  fisco-node2:
    image: fiscoorg/fiscobcos:v3
    container_name: etds-fisco-node2
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/fisco-bcos"]
    command: ["-c", "/data/config.ini"]
    ports:
      - "20202:20200"
    volumes:
      - fisco_node2:/data
    networks:
      - fisco-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  fisco-node3:
    image: fiscoorg/fiscobcos:v3
    container_name: etds-fisco-node3
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/fisco-bcos"]
    command: ["-c", "/data/config.ini"]
    ports:
      - "20203:20200"
    volumes:
      - fisco_node3:/data
    networks:
      - fisco-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # ==================== FATE 隐私计算 ====================

  fate-coordinator:
    image: federatedai/fate:v2
    container_name: etds-fate-coordinator
    restart: unless-stopped
    environment:
      FATE_PARTY_ID: ${FATE_PARTY_ID:-10000}
    ports:
      - "9380:9380"
    volumes:
      - fate_data:/data
    networks:
      - privacy-net
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 32G

  # ==================== MPSpdz 安全多方计算 ====================

  mpspdz-party0:
    image: emp-toolkit/mpspdz:latest
    container_name: etds-mpspdz-party0
    restart: unless-stopped
    networks:
      - privacy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  mpspdz-party1:
    image: emp-toolkit/mpspdz:latest
    container_name: etds-mpspdz-party1
    restart: unless-stopped
    networks:
      - privacy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  mpspdz-party2:
    image: emp-toolkit/mpspdz:latest
    container_name: etds-mpspdz-party2
    restart: unless-stopped
    networks:
      - privacy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # ==================== 监控 ====================

  prometheus:
    image: prom/prometheus:latest
    container_name: etds-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  grafana:
    image: grafana/grafana:latest
    container_name: etds-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana_admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/energy-tds.json
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - energy-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

# ==================== 网络 ====================

networks:
  energy-net:
    driver: bridge
    name: etds-energy-net
  fisco-net:
    driver: bridge
    name: etds-fisco-net
    internal: true
  privacy-net:
    driver: bridge
    name: etds-privacy-net
    internal: true

# ==================== 存储卷 ====================

volumes:
  pg_data:
    name: etds-pg_data
  redis_data:
    name: etds-redis_data
  mongo_data:
    name: etds-mongo_data
  minio_data:
    name: etds-minio_data
  fisco_node0:
    name: etds-fisco_node0
  fisco_node1:
    name: etds-fisco_node1
  fisco_node2:
    name: etds-fisco_node2
  fisco_node3:
    name: etds-fisco_node3
  fate_data:
    name: etds-fate_data
  prometheus_data:
    name: etds-prometheus_data
  grafana_data:
    name: etds-grafana_data
  rabbitmq_data:
    name: etds-rabbitmq_data
